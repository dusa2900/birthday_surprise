
<style>
  @keyframes float1 { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-18px) rotate(3deg)} }
  @keyframes float2 { 0%,100%{transform:translateY(0) rotate(2deg)} 50%{transform:translateY(-22px) rotate(-2deg)} }
  @keyframes float3 { 0%,100%{transform:translateY(0) rotate(-1deg)} 50%{transform:translateY(-14px) rotate(4deg)} }
  @keyframes float4 { 0%,100%{transform:translateY(0) rotate(4deg)} 50%{transform:translateY(-20px) rotate(-3deg)} }
  @keyframes float5 { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-16px) rotate(2deg)} }
  @keyframes float6 { 0%,100%{transform:translateY(0) rotate(3deg)} 50%{transform:translateY(-12px) rotate(-4deg)} }
  @keyframes confetti-fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(620px) rotate(720deg);opacity:0} }
  @keyframes pop-in { 0%{transform:scale(0) rotate(-10deg);opacity:0} 70%{transform:scale(1.1) rotate(3deg)} 100%{transform:scale(1) rotate(0deg);opacity:1} }
  @keyframes wiggle { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(-6deg)} 75%{transform:rotate(6deg)} }
  @keyframes wish-appear { 0%{transform:scale(0.5);opacity:0} 60%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
  @keyframes sparkle { 0%,100%{opacity:0;transform:scale(0)} 50%{opacity:1;transform:scale(1)} }
  @keyframes no-jump { 0%{transform:scale(1)} 30%{transform:scale(0.85)} 60%{transform:scale(1.1)} 100%{transform:scale(1)} }

  *{box-sizing:border-box;margin:0;padding:0;}

  .wrap {
    height: 100%;
    background: linear-gradient(160deg, #1a0533 0%, #2d0a5e 40%, #0d2060 100%);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    font-family: var(--font-sans, sans-serif);
  }

  .balloon-group{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
  .balloon{position:absolute;display:flex;flex-direction:column;align-items:center;}
  .balloon-body{width:62px;height:72px;border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;position:relative;}
  .balloon-body::after{content:'';position:absolute;top:12px;left:10px;width:12px;height:18px;background:rgba(255,255,255,0.25);border-radius:50%;transform:rotate(-30deg);}
  .balloon-knot{width:6px;height:8px;clip-path:polygon(50% 0%,0% 100%,100% 100%);}
  .balloon-string{width:1px;height:120px;background:rgba(255,255,255,0.3);}

  .b1{left:3%;bottom:-10px;animation:float1 4.2s ease-in-out infinite;}
  .b2{left:10%;bottom:-20px;animation:float2 3.8s ease-in-out infinite 0.5s;}
  .b3{left:20%;bottom:-5px;animation:float3 4.5s ease-in-out infinite 1s;}
  .b4{left:30%;bottom:-15px;animation:float4 3.6s ease-in-out infinite 0.3s;}
  .b5{left:70%;bottom:-8px;animation:float5 4.1s ease-in-out infinite 0.7s;}
  .b6{left:80%;bottom:-18px;animation:float1 3.9s ease-in-out infinite 1.2s;}
  .b7{left:88%;bottom:-5px;animation:float2 4.3s ease-in-out infinite 0.2s;}
  .b8{left:95%;bottom:-12px;animation:float3 3.7s ease-in-out infinite 0.9s;}
  .b9{left:55%;bottom:-22px;animation:float6 4.0s ease-in-out infinite 0.4s;}
  .b10{left:45%;bottom:-8px;animation:float4 4.4s ease-in-out infinite 1.4s;}

  .card {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 40px 36px;
    max-width: calc(100% - 300px);
    width: 100%;
    text-align: center;
    position: relative;
    z-index: 10;
    animation: pop-in 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .emoji-big{font-size:52px;display:block;margin-bottom:8px;animation:wiggle 2s ease-in-out infinite;}
  .question{font-size:19px;font-weight:500;color:#fff;line-height:1.5;margin-bottom:32px;}
  .question span{color:#FFD700;}

  /* Button container — fixed size so layout never shifts */
  .btn-row {
    position: relative;
    width: 100%;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #btn-yes {
    background: linear-gradient(135deg,#FF6B9D,#FF3366);
    color: #fff;
    border: none;
    padding: 14px 38px;
    border-radius: 50px;
    font-size: 18px;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,51,102,0.5);
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 2;
  }
  #btn-yes:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(255,51,102,0.7);}
  #btn-yes:active{transform:scale(0.96);}

  #btn-no {
    background: rgba(255,255,255,0.12);
    color: #fff;
    border: 1.5px solid rgba(255,255,255,0.35);
    padding: 14px 38px;
    border-radius: 50px;
    font-size: 18px;
    font-weight: 500;
    cursor: not-allowed;
    position: absolute;
    /* default position — right of yes */
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    transition: background 0.15s;
    z-index: 2;
    pointer-events: auto;
  }

  .wishes {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    animation: wish-appear 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .wishes h1{font-size:30px;font-weight:500;color:#FFD700;line-height:1.3;}
  .wishes p{font-size:15px;color:rgba(255,255,255,0.88);line-height:1.7;}
  .wishes .big-emoji{font-size:58px;}

  .confetti-piece{position:absolute;border-radius:2px;animation:confetti-fall linear forwards;pointer-events:none;z-index:20;display:none;}
  .sparkle{position:absolute;width:6px;height:6px;border-radius:50%;pointer-events:none;animation:sparkle 1.5s ease-in-out infinite;display:none;z-index:5;}
</style>

<div class="wrap" id="wrap">

  <div class="balloon-group">
    <div class="balloon b1"><div class="balloon-body" style="background:#FF6B9D;"></div><div class="balloon-knot" style="background:#FF6B9D;"></div><div class="balloon-string"></div></div>
    <div class="balloon b2"><div class="balloon-body" style="background:#FFD700;"></div><div class="balloon-knot" style="background:#FFD700;"></div><div class="balloon-string"></div></div>
    <div class="balloon b3"><div class="balloon-body" style="background:#7C3AED;"></div><div class="balloon-knot" style="background:#7C3AED;"></div><div class="balloon-string"></div></div>
    <div class="balloon b4"><div class="balloon-body" style="background:#10B981;"></div><div class="balloon-knot" style="background:#10B981;"></div><div class="balloon-string"></div></div>
    <div class="balloon b5"><div class="balloon-body" style="background:#F97316;"></div><div class="balloon-knot" style="background:#F97316;"></div><div class="balloon-string"></div></div>
    <div class="balloon b6"><div class="balloon-body" style="background:#3B82F6;"></div><div class="balloon-knot" style="background:#3B82F6;"></div><div class="balloon-string"></div></div>
    <div class="balloon b7"><div class="balloon-body" style="background:#EC4899;"></div><div class="balloon-knot" style="background:#EC4899;"></div><div class="balloon-string"></div></div>
    <div class="balloon b8"><div class="balloon-body" style="background:#EF4444;"></div><div class="balloon-knot" style="background:#EF4444;"></div><div class="balloon-string"></div></div>
    <div class="balloon b9"><div class="balloon-body" style="background:#06B6D4;"></div><div class="balloon-knot" style="background:#06B6D4;"></div><div class="balloon-string"></div></div>
    <div class="balloon b10"><div class="balloon-body" style="background:#A78BFA;"></div><div class="balloon-knot" style="background:#A78BFA;"></div><div class="balloon-string"></div></div>
  </div>

  <div class="card" id="question-card">
    <span class="emoji-big">🎂</span>
<p class="question">
  Hey <span>Kavya</span>!  Are you <span>ready</span> to feel this special day or still haunting people with that <span>white ghost</span> look? 😌👻
</p>
    <div class="btn-row" id="btn-row">
      <button id="btn-yes" onclick="showWishes()">Yes! 😛</button>
      <button id="btn-no" onclick="return false;">No 😒</button>
    </div>
  </div>

  <div class="card wishes" id="wish-card">
    <div class="big-emoji">🎊</div>
    <h1>Happy Birthday Kavya! 🎂</h1>
    <p style="margin-top:8px;font-size:24px;">✨🥳🎈🎁🎉</p>
    <p style="margin-top:14px;">May your day be as wonderful as you are!<br>Wishing you endless joy, laughter,<br>and all the cake you can eat! 🍰</p>
    <p style="margin-top:16px;font-size:13px;">You deserve every bit of happiness today 💛</p>
  </div>
</div>

<script>
  const noBtn = document.getElementById('btn-no');
  const row = document.getElementById('btn-row');
  const wrap = document.getElementById('wrap');
  const confettiColors = ['#FF6B9D','#FFD700','#7C3AED','#10B981','#F97316','#3B82F6','#EC4899','#EF4444','#06B6D4','#A78BFA'];

  // Keep track of previous quadrant so we always visibly jump
  let lastQuadrant = -1;

  function moveNoBtn() {
    const rowRect = row.getBoundingClientRect();
    const btnW = noBtn.offsetWidth || 130;
    const btnH = noBtn.offsetHeight || 48;

    // Card inner width (row width)
    const maxW = rowRect.width;
    const maxH = rowRect.height;

    // 4 quadrant zones inside the btn-row area, excluding centre
    // We expand the row height via JS to give more room
    row.style.height = '140px';

    const zones = [
      { left: 4, top: 4 },
      { left: maxW - btnW - 4, top: 4 },
      { left: 4, top: 140 - btnH - 4 },
      { left: maxW - btnW - 4, top: 140 - btnH - 4 },
    ];

    // pick a zone different from last
    let q;
    do { q = Math.floor(Math.random() * zones.length); } while (q === lastQuadrant);
    lastQuadrant = q;

    noBtn.style.position = 'absolute';
    noBtn.style.right = 'auto';
    noBtn.style.top = zones[q].top + 'px';
    noBtn.style.left = zones[q].left + 'px';
    noBtn.style.transform = 'none';

    // tiny bounce animation
    noBtn.style.animation = 'none';
    void noBtn.offsetWidth;
    noBtn.style.animation = 'no-jump 0.3s ease';
  }

  noBtn.addEventListener('mouseenter', moveNoBtn);
  noBtn.addEventListener('touchstart', function(e){ e.preventDefault(); moveNoBtn(); }, {passive:false});
  noBtn.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); });

  function launchConfetti() {
    for (let i = 0; i < 70; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random() * 100 + '%';
        el.style.top = '-15px';
        el.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
        el.style.width = (8 + Math.random() * 8) + 'px';
        el.style.height = (8 + Math.random() * 8) + 'px';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        el.style.animationDuration = (2 + Math.random() * 2.5) + 's';
        el.style.display = 'block';
        wrap.appendChild(el);
        setTimeout(() => el.remove(), 4800);
      }, i * 35);
    }
  }

  function addSparkles() {
    for (let i = 0; i < 14; i++) {
      const el = document.createElement('div');
      el.className = 'sparkle';
      el.style.left = (8 + Math.random() * 84) + '%';
      el.style.top = (8 + Math.random() * 84) + '%';
      el.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
      el.style.animationDelay = (Math.random() * 1.5) + 's';
      el.style.animationDuration = (1 + Math.random()) + 's';
      el.style.display = 'block';
      wrap.appendChild(el);
    }
  }

  function showWishes() {
    document.getElementById('question-card').style.display = 'none';
    const wc = document.getElementById('wish-card');
    wc.style.display = 'flex';
    launchConfetti();
    addSparkles();
    setTimeout(launchConfetti, 900);
  }
</script>
